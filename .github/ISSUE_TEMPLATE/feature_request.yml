name: Feature Request
description: Propose a new capability or product change.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds or rejected options
  - type: textarea
    id: scope
    attributes:
      label: Scope and tradeoffs
      description: Note any UX, performance, compatibility, or complexity tradeoffs
