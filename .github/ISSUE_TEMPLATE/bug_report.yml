name: Bug Report
description: Report a defect, regression, or incorrect scanning behavior.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction when possible.
  - type: input
    id: version
    attributes:
      label: envguard version
      description: Output of `envguard version`
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS, architecture, and Git version if relevant
      placeholder: macOS arm64, git 2.49.0
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config
      description: Relevant `.envguard.yml` or note that defaults are in use
      render: yaml
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal files, commands, and steps to reproduce the issue
      placeholder: |
        1. Run `envguard install`
        2. Stage ...
        3. Commit ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output or logs
      render: text
